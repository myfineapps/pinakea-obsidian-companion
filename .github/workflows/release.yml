name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release metadata
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import re
          import sys

          tag = os.environ["TAG"]
          semver = re.compile(r"^[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$")
          if not semver.fullmatch(tag):
              sys.exit(f"Tag '{tag}' is not valid semver")

          with open("manifest.json", "r", encoding="utf-8") as f:
              manifest = json.load(f)
          with open("versions.json", "r", encoding="utf-8") as f:
              versions = json.load(f)

          version = manifest.get("version")
          min_app = manifest.get("minAppVersion")
          plugin_id = manifest.get("id")

          if version != tag:
              sys.exit(f"Tag/version mismatch: tag='{tag}', manifest.version='{version}'")
          if tag not in versions:
              sys.exit(f"versions.json missing key '{tag}'")
          if versions[tag] != min_app:
              sys.exit(
                  "versions.json value mismatch for "
                  f"'{tag}': expected '{min_app}', got '{versions[tag]}'"
              )
          if plugin_id != "pinakea-obsidian-companion":
              sys.exit(
                  "Plugin id mismatch: expected 'pinakea-obsidian-companion', "
                  f"got '{plugin_id}'"
              )
          PY

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            main.js
            manifest.json
            styles.css
            versions.json
